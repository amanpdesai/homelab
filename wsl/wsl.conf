# Deployed by scripts/wsl/00-bootstrap.sh to /etc/wsl.conf.
# Applies inside this distro only.
# After edits, run `wsl --terminate <distro>` from Windows so the next
# start picks up changes.

[boot]
# Boot under systemd. Required so sshd, docker, and tailscaled run as
# real units instead of needing manual start in every shell.
systemd=true

[network]
generateHosts=true
generateResolvConf=true
hostname=homelab

[user]
# Set this to your WSL username (the one you created on first run).
# default = aman

[interop]
enabled=true
# Do not pollute $PATH inside WSL with Windows binaries.
appendWindowsPath=false

[automount]
enabled=true
# Make Windows drives behave like normal Linux mounts where possible.
options="metadata,umask=22,fmask=11"
