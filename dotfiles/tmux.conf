# Prefix on C-a (more reachable than default C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Sane defaults
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits keep the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window  -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

# Copy mode uses vi keys, yank goes to the Windows clipboard via clip.exe
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

# Status line: minimal, dark, server-appropriate
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1c1c1c fg=#cccccc"
set -g status-left-length 30
set -g status-left  "#[fg=#5fafff,bold] #h #[default]| "
set -g status-right "#[fg=#888888] %Y-%m-%d %H:%M "
setw -g window-status-current-style "fg=#000000 bg=#5fafff bold"
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "
